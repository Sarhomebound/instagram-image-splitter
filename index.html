<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Image Splitter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Instagram Image Splitter</h1>
    <p>Upload an image and split it into Instagram grid posts.</p>

    <input type="file" id="imageInput" accept="image/*" />

    <select id="gridSelect">
      <option value="3">3 Grid</option>
      <option value="9">9 Grid</option>
      <option value="12">12 Grid</option>
    </select>

    <button onclick="splitImage()">Split Image</button>

    <div id="preview"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
