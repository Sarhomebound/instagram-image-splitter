<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Grid Splitter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Instagram Grid Splitter</h1>

<p>
Upload one image and split it into Instagram Grid or Carousel posts.
</p>

<input type="file" id="imageInput" accept="image/*">

<div class="mode-buttons">
<button onclick="setMode('grid')">Grid</button>
<button onclick="setMode('carousel')">Carousel</button>
</div>

<div id="gridOptions">
<h3>Grid Size</h3>

<select id="gridSelect">
<option value="3">3×1 Grid</option>
<option value="6">3×2 Grid</option>
<option value="9">3×3 Grid</option>
<option value="12">3×4 Grid</option>
<option value="15">3×5 Grid</option>
<option value="18">3×6 Grid</option>
</select>

</div>

<div id="carouselOptions" class="hidden">

<h3>Carousel Slides</h3>

<select id="carouselSelect">
<option value="2">2 Slides</option>
<option value="3">3 Slides</option>
<option value="5">5 Slides</option>
<option value="10">10 Slides</option>
<option value="20">20 Slides</option>
</select>

</div>

<button class="create-btn" onclick="processImage()">
Create Images
</button>

<div class="notice">
Upload to Instagram in the same order shown below.
</div>

<div id="preview"></div>

</div>

<script src="script.js"></script>
</body>
</html>
